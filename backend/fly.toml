# fly.toml — конфиг для Fly.io
app = "tg-crm-backend"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "sessions"
  destination = "/app/sessions"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256